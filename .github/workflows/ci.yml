name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt pytest

      - name: Compile all python
        run: python -m py_compile scripts/*.py scripts/web/server.py

      - name: Run tests
        run: python -m pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend JS syntax check
        run: |
          python - <<'PY'
          import re
          html = open('scripts/web/index.html', encoding='utf-8').read()
          js = re.search(r'<script>(.*)</script>', html, re.S).group(1)
          open('/tmp/panel.js', 'w', encoding='utf-8').write(js)
          PY
          node --check /tmp/panel.js
