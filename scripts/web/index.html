<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 记忆助手 · MemoryHub</title>
<link rel="icon" type="image/png" href="/api/icon">
<link rel="apple-touch-icon" href="/api/icon">
<style>
:root{
  --bg:#f4f5f8;--surf:#fff;--bd:#e9eaf0;--bd2:#dcdde6;--tx:#1c1d22;--mut:#71727e;--faint:#9a9ba6;
  --ac:#5b50e6;--ac-soft:#eeecfd;--ok:#0e8a52;--ok-soft:#e6f5ec;--warn:#a65a00;--warn-soft:#fdf1e1;
  --dng:#cc3b32;--dng-soft:#fceceb;--info:#2563c9;--info-soft:#e8f0fd;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,"PingFang SC",system-ui,sans-serif;font-size:15px;line-height:1.55}
.app{display:grid;grid-template-columns:212px 1fr;min-height:100vh}
/* 侧边栏 */
.side{background:var(--surf);border-right:1px solid var(--bd);padding:18px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;padding:4px 8px 14px}
.brand .dot{font-size:18px}
.navi{display:flex;align-items:center;gap:10px;width:100%;border:none;background:transparent;color:var(--mut);padding:9px 12px;border-radius:9px;cursor:pointer;font-size:14px;text-align:left;transition:.12s}
.navi:hover{background:var(--bg)}
.navi.on{background:var(--ac-soft);color:var(--ac);font-weight:500}
.navi .ico{width:18px;text-align:center}
.navi .pip{margin-left:auto;background:var(--dng);color:#fff;font-size:11px;border-radius:10px;padding:1px 7px}
.navi.sub{padding-left:32px;font-size:13.5px}
.subnav{display:flex;flex-direction:column;gap:4px}
.navi.grp .chev{transition:.15s;font-size:11px;color:var(--faint)}
.navi.grp.open .chev{transform:rotate(90deg)}
.subtabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--bd)}
.stab{border:none;background:transparent;color:var(--mut);padding:7px 14px;cursor:pointer;font-size:13.5px}
.stab.on{color:var(--ac);font-weight:500;box-shadow:inset 0 -2px 0 var(--ac)}
.side .foot{margin-top:auto;font-size:11px;color:var(--faint);padding:10px 8px;line-height:1.6;border-top:1px solid var(--bd)}
/* 主区 */
main{padding:26px 36px 60px;max-width:1200px;margin:0 auto;width:100%}
.head h1{font-size:20px;margin:0 0 3px;font-weight:600}
.head p{margin:0 0 20px;color:var(--mut);font-size:13px}
/* 指标卡 */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metric{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:16px 16px 14px}
.metric .ico{font-size:18px}
.metric .v{font-size:27px;font-weight:600;margin:6px 0 1px;letter-spacing:-.5px}
.metric .l{font-size:12px;color:var(--mut)}
/* 卡片/面板 */
.panel{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:18px}
.panel h3{margin:0 0 14px;font-size:13px;color:var(--mut);font-weight:600;letter-spacing:.02em}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
input,select{height:38px;border:1px solid var(--bd2);border-radius:10px;padding:0 12px;font-size:13px;background:var(--surf);color:var(--tx);outline:none;transition:.12s}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-soft)}
input[type=text]{flex:1;min-width:200px}
@keyframes mhpulse{0%{transform:translate(-50%,-50%) scale(.85);opacity:.55}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
.btn{height:38px;border:1px solid var(--bd2);background:var(--surf);border-radius:10px;padding:0 16px;cursor:pointer;font-size:13px;color:var(--tx);transition:.12s}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.pri:hover{filter:brightness(1.07)}
.btn.ok{border-color:#bfe3cf;background:var(--ok-soft);color:var(--ok)}
.btn.dng{border-color:#f0cdca;background:var(--dng-soft);color:var(--dng)}
/* 记忆卡 */
.mcard{background:var(--surf);border:1px solid var(--bd);border-left:3px solid var(--cl,#ccc);border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:.13s}
.mcard:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(20,20,40,.07);border-color:var(--bd2)}
.mcard .top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.chip{font-size:13px;font-weight:500;padding:2px 9px;border-radius:7px}
.pill{font-size:12.5px;padding:2px 8px;border-radius:7px;background:var(--bg);color:var(--mut)}
.pill.ok{background:var(--ok-soft);color:var(--ok)}
.pill.warn{background:var(--warn-soft);color:var(--warn)}
.pill.dead{background:var(--dng-soft);color:var(--dng);text-decoration:line-through}
.pill.ai{background:var(--info-soft);color:var(--info)}
.claim{font-size:15.5px;margin:2px 0;line-height:1.5}
.cf{margin-left:auto;display:flex;align-items:center;gap:7px;flex:none}
.cf .track{width:54px;height:6px;background:var(--bd);border-radius:4px;overflow:hidden}
.cf .fill{height:100%;border-radius:4px}
.cf .num{font:12px ui-monospace,monospace;color:var(--mut)}
.ev{font-size:13.5px;color:var(--mut);background:var(--bg);border-radius:8px;padding:8px 11px;line-height:1.6;margin-top:8px}
.ev mark{background:var(--warn-soft,#fef3c7);color:inherit;padding:0 1px;border-radius:2px}
.meta{font-size:13px;color:var(--faint);margin-top:8px}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}
.list .mcard{margin-bottom:0}
/* 图表 */
.bars{display:flex;flex-direction:column;gap:9px}
.bars .b{display:flex;align-items:center;gap:10px;font-size:12.5px}
.bars .lab{width:78px;text-align:right;color:var(--mut);flex:none}
.bars .track{flex:1;background:var(--bg);border-radius:5px;height:18px;overflow:hidden}
.bars .fill{height:100%;border-radius:5px;min-width:3px}
.bars .num{width:44px;color:var(--mut);font:12px ui-monospace,monospace}
/* modal */
.ov{position:fixed;inset:0;background:rgba(22,22,40,.42);display:none;align-items:flex-start;justify-content:center;padding:48px 16px;overflow:auto;z-index:20;backdrop-filter:blur(2px)}
.ov.show{display:flex}
.modal{background:var(--surf);border-radius:16px;max-width:700px;width:100%;padding:24px 26px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal .x{float:right;border:none;background:var(--bg);width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--mut);font-size:16px}
.modal h2{font-size:20px;margin:8px 0 14px;line-height:1.45}
.kv{font-size:14px;color:var(--mut);margin:3px 0}
.sec-t{font-size:13px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fbc{position:relative;display:inline-flex;align-items:center;gap:4px;text-transform:none;letter-spacing:0}
.fbtoggle{border:1px solid transparent;background:none;border-radius:6px;padding:1px 6px;cursor:pointer;font-size:11px;line-height:1.5;color:var(--faint);opacity:.35;transition:.12s}
.fbtoggle:hover{opacity:1;background:var(--surf);border-color:var(--bd2)}
.fbtoggle.set{opacity:1;font-size:13px}
.fbtoggle.set.up{color:var(--ok)}
.fbtoggle.set.down{color:var(--dng)}
.fbpop{display:inline-flex;align-items:center;gap:4px}
.fbpop[hidden]{display:none}
.fbtn{border:1px solid var(--bd2);background:var(--surf);border-radius:7px;padding:2px 8px;cursor:pointer;font-size:13px;line-height:1.4;opacity:.5;transition:.12s}
.fbtn:hover{opacity:1;background:var(--bg)}
.fbtn.on{opacity:1;font-weight:600}
.fbtn.up.on{border-color:#bfe3cf;background:var(--ok-soft);color:var(--ok)}
.fbtn.down.on{border-color:#f0cdca;background:var(--dng-soft);color:var(--dng)}
.fbreason{height:30px;font-size:13px;padding:0 9px;border:1px solid var(--bd2);border-radius:7px;width:240px;max-width:60%}
.degraded{background:var(--warn-soft);color:var(--warn);border-radius:10px;padding:9px 13px;font-size:12.5px;margin-bottom:14px}
.empty{color:var(--faint);padding:34px;text-align:center;font-size:14px}
.note{background:var(--ac-soft);color:#4a40c4;border-radius:10px;padding:10px 14px;font-size:13.5px;margin-bottom:16px;line-height:1.6}
.help h2{font-size:16px;margin:22px 0 8px}
.help p,.help li{font-size:13.5px;color:#2f3038;line-height:1.7}
.help code{background:var(--bg);padding:1px 6px;border-radius:5px;font-size:12px}
.help table{border-collapse:collapse;width:100%;margin:8px 0 16px;font-size:13px}
.help th,.help td{border:1px solid var(--bd);padding:7px 10px;text-align:left}
.help th{background:var(--bg);color:var(--mut);font-weight:600}
.pager{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:14px}
</style>
</head>
<body>
<div class="app">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><symbol id="mh" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#0E1017"/><text x="50" y="54" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="40" fill="#ffffff">MH</text><line x1="35" y1="74" x2="65" y2="74" stroke="#5B50E6" stroke-width="4"/><circle cx="35" cy="74" r="4.5" fill="#5B50E6"/><circle cx="50" cy="74" r="4.5" fill="#5B50E6"/><circle cx="65" cy="74" r="4.5" fill="#5B50E6"/></symbol></svg>
  <aside class="side">
    <div class="brand"><svg style="width:22px;height:22px;vertical-align:-5px;margin-right:3px"><use href="#mh"/></svg> AI 记忆助手</div>
    <button class="navi on" data-v="dash"><span class="ico">📊</span>仪表盘</button>
    <button class="navi grp" id="memgrp"><span class="ico"><svg style="width:16px;height:16px;vertical-align:-3px"><use href="#mh"/></svg></span>记忆<span style="margin-left:auto;display:flex;align-items:center;gap:6px"><span class="pip" id="memq" style="display:none;margin-left:0"></span><span class="chev">▸</span></span></button>
    <div class="subnav" id="memsub" style="display:none">
      <button class="navi sub" data-v="browse"><span class="ico">🗂️</span>浏览</button>
      <button class="navi sub" data-v="recall"><span class="ico">💡</span>召回</button>
      <button class="navi sub" data-v="retro"><span class="ico">🔁</span>复盘</button>
      <button class="navi sub" data-v="queue"><span class="ico">✅</span>待确认<span class="pip" id="qpip" style="display:none"></span></button>
    </div>
    <button class="navi" data-v="map"><span class="ico">🗺️</span>地图</button>
    <button class="navi" data-v="import"><span class="ico">📥</span>导入</button>
    <button class="navi" data-v="settings"><span class="ico">⚙️</span>设置<span class="pip" id="upip" style="display:none">新</span></button>
    <div class="foot" id="foot">本地记忆面板<br>127.0.0.1:7788</div>
  </aside>
  <main>
    <div id="view-dash"></div>
    <div id="view-browse" style="display:none"></div>
    <div id="view-recall" style="display:none"></div>
    <div id="view-map" style="display:none"></div>
    <div id="view-retro" style="display:none"></div>
    <div id="view-queue" style="display:none"></div>
    <div id="view-import" style="display:none"></div>
    <div id="view-settings" style="display:none">
      <div class="subtabs">
        <button class="stab on" data-s="general">常规</button>
        <button class="stab" data-s="health">体检</button>
        <button class="stab" data-s="help">帮助</button>
      </div>
      <div id="set-general"></div>
      <div id="view-health" style="display:none"></div>
      <div id="view-help" style="display:none"></div>
    </div>
  </main>
</div>
<div class="ov" id="ov"><div class="modal"><button class="x" onclick="closeModal()">✕</button><div id="mbody"></div></div></div>

<script src="/vendor/force-graph.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const escA=s=>esc(s).replace(/"/g,'&quot;');
async function api(p,o){const r=await fetch(p,o);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function post(p,b){return api(p,{method:'POST',headers:{'Content-Type':'application/json','X-MemoryHub':'1'},body:JSON.stringify(b)});}
const TC={'决策':'#5b50e6','SOP':'#0d9488','方法论':'#2563eb','认知':'#7c3aed','经验':'#d97706','反馈':'#db2777','事实':'#6b7280','偏好':'#059669','关系':'#0891b2','bug':'#cc3b32'};
const tcolor=t=>TC[t]||'#8a8b96';
const tint=t=>tcolor(t)+'1a';
function chip(t){return `<span class="chip" style="background:${tint(t)};color:${tcolor(t)}">${esc(t)}</span>`;}
function statusPill(s){const c=s==='已确认'?'ok':((s==='休眠'||s==='已被取代'||s==='已失效')?'dead':(s==='待核'?'warn':''));return `<span class="pill ${c}">${esc(s)}</span>`;}
function cf(v){if(v==null)return '';const c=v>=.8?'#0e8a52':(v>=.55?'#2563c9':'#a65a00');return `<span class="cf"><span class="track"><span class="fill" style="width:${Math.round(v*100)}%;background:${c}"></span></span><span class="num">${Number(v).toFixed(2)}</span></span>`;}
function bars(data,colorFn){if(!data.length)return '<div class="empty">无数据</div>';const m=Math.max(...data.map(d=>d.n));
  return '<div class="bars">'+data.map(d=>`<div class="b"><span class="lab">${esc(d.label)}</span><span class="track"><span class="fill" style="width:${Math.max(2,Math.round(d.n/m*100))}%;background:${colorFn?colorFn(d.label):'#5b50e6'}"></span></span><span class="num">${d.n}</span></div>`).join('')+'</div>';}

// ---- 仪表盘 ----
function donut(data,colorFn,topN){
  data=data.filter(d=>d.n>0).slice().sort((a,b)=>b.n-a.n);
  const total=data.reduce((s,d)=>s+d.n,0)||1;
  let sl=data;
  if(topN&&data.length>topN){const head=data.slice(0,topN);const rest=data.slice(topN).reduce((s,d)=>s+d.n,0);sl=rest>0?head.concat([{label:'其他',n:rest,_o:1}]):head;}
  const PAL=['#5b50e6','#0d9488','#d97706','#db2777','#2563eb','#7c3aed','#0891b2','#059669','#e11d48','#f59e0b'];
  const col=(d,i)=>d._o?'#c7c9d1':(colorFn?colorFn(d.label):PAL[i%PAL.length]);
  const C=2*Math.PI*54;let acc=0;
  const arcs=sl.map((d,i)=>{const f=d.n/total,dash=f*C;const c=`<circle cx="70" cy="70" r="54" fill="none" stroke="${col(d,i)}" stroke-width="22" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${(-acc*C).toFixed(2)}" transform="rotate(-90 70 70)"/>`;acc+=f;return c;}).join('');
  const fmt=n=>n>=1000?(n/1000).toFixed(1)+'k':n;
  const svg=`<svg viewBox="0 0 140 140" style="width:130px;height:130px;flex:none"><circle cx="70" cy="70" r="54" fill="none" stroke="var(--bg)" stroke-width="22"/>${arcs}<text x="70" y="66" text-anchor="middle" font-size="23" font-weight="600" fill="var(--tx)">${fmt(total)}</text><text x="70" y="85" text-anchor="middle" font-size="11" fill="var(--mut)">总计</text></svg>`;
  const leg=sl.map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:2.5px 0"><span style="width:10px;height:10px;border-radius:3px;background:${col(d,i)};flex:none"></span><span style="flex:1;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.label)}</span><span style="color:var(--mut);font:12px ui-monospace,monospace">${fmt(d.n)}</span><span style="color:var(--faint);width:34px;text-align:right;font-size:11px">${(d.n/total*100).toFixed(0)}%</span></div>`).join('');
  return `<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap"><div>${svg}</div><div style="flex:1;min-width:150px;max-height:200px;overflow:auto">${leg}</div></div>`;
}
function onboardStep(done,n,title,desc,btn,action){
  return `<li style="display:flex;gap:11px;align-items:flex-start;padding:8px 0;border-top:.5px solid var(--bd)${done?';opacity:.6':''}">
    <span style="flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:600;background:${done?'var(--ok)':'var(--ac)'};color:#fff">${done?'✓':n}</span>
    <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13.5px">${title}${done?' <span style="color:var(--ok);font-weight:400;font-size:12px">· 已完成</span>':''}</div>
      <div style="color:var(--mut);font-size:12.5px;margin-top:2px;line-height:1.5">${desc}</div></div>
    ${done?'':`<button class="btn pri" style="height:30px;padding:0 13px;flex:none" onclick="${action}">${btn} →</button>`}
  </li>`;
}
function onboardPanel(s1,s2,s3){
  const done=[s1,s2,s3].filter(Boolean).length;
  return `<div class="panel" style="border-left:3px solid var(--ac)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">👋 上手引导 · 已完成 ${done}/3</h3>
      <a href="#" onclick="onboardDismiss();return false" style="font-size:12px;color:var(--mut)">不再显示</a></div>
    <div style="color:var(--mut);font-size:12.5px;margin:4px 0 6px">三步走完就能让任意 AI 随时召回你的记忆。做完自动消失。</div>
    <ol style="margin:0;padding:0;list-style:none">
      ${onboardStep(s1,1,'配 API Key','选模型 provider、填 key(默认阿里云百炼,OpenAI / DeepSeek 等也行)。导入和语义召回都要用它把记忆向量化——所以这是第一步前置。','去设置',"show('settings')")}
      ${onboardStep(s2,2,'导入记忆','拖入 Claude 导出的 memories.json,或一键扫描本机 Claude Code 对话。','去导入',"show('import')")}
      ${onboardStep(s3,3,'批准待确认','AI 只是「提名」,你在待确认里逐条批准,才真正入库、参与召回。','去待确认',"show('queue')")}
    </ol></div>`;
}
function onboardDismiss(){try{localStorage.setItem('mh_onboard_hide','1');}catch(e){}renderDash();}
async function renderDash(){
  const [s,cfg]=await Promise.all([api('/api/stats'),api('/api/config').catch(()=>({}))]);
  $('#foot').innerHTML=`本地记忆面板<br>记忆 ${s.memory_item} · 原始 ${s.raw_event.toLocaleString()}`;
  const q=s.queue||0;['#qpip','#memq'].forEach(id=>{const el=$(id);if(el){el.style.display=q?'inline-block':'none';el.textContent=q;}});
  const ng=s.nightly||{};
  const _cf=(s.by_status||[]).find(x=>x.status==='已确认');
  const oS1=!!cfg.has_key, oS2=(s.memory_item>0||(s.queue||0)>0||(s.raw_event||0)>0), oS3=!!(_cf&&_cf.n>0);
  let _hide=false;try{_hide=localStorage.getItem('mh_onboard_hide')==='1';}catch(e){}
  const showOnboard=!(oS1&&oS2&&oS3)&&!_hide;
  $('#view-dash').innerHTML=`
   <div class="head"><h1>仪表盘</h1><p>一眼看全局:记忆库规模、构成、待办与昨晚自动任务。</p></div>
   ${showOnboard?onboardPanel(oS1,oS2,oS3):''}
   <div class="metrics">
     <div class="metric"><div class="ico"><svg style="width:30px;height:30px"><use href="#mh"/></svg></div><div class="v">${s.memory_item}</div><div class="l">现行记忆</div></div>
     <div class="metric"><div class="ico">📥</div><div class="v">${(s.raw_event/1000).toFixed(1)}k</div><div class="l">原始事件</div></div>
     <div class="metric"><div class="ico">⏳</div><div class="v">${q}</div><div class="l">待确认</div></div>
     <div class="metric"><div class="ico">🌙</div><div class="v" style="font-size:16px;margin-top:14px">${esc(ng.state||'?')}</div><div class="l">夜间任务</div></div>
   </div>
   <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-bottom:18px">
     <div class="panel" style="margin:0"><h3>按类型 · 现行记忆构成</h3>${donut(s.by_type.map(x=>({label:x.type,n:x.n})),tcolor,7)}</div>

function mcard(m){return `<div class="mcard" style="--cl:${tcolor(m.type)}" onclick="openD('${m.id}')">

async function openD(id){
  const m=await api('/api/memory/'+encodeURIComponent(id));
  const prov=m.provenance.map(p=>`<div class="kv">· ${esc(p.source)} / <code>${esc((p.conv_id||'').slice(0,14))}</code>${p.doc&&p.doc.title?' · '+esc(p.doc.title):''}</div>`).join('')||'<div class="kv">—</div>';
  const revs=m.revisions.map(r=>`<div class="kv">r${r.revision_num} · ${esc(r.change_reason)} · ${esc(r.status)} · conf ${r.confidence?Number(r.confidence).toFixed(2):'—'} · ${esc((r.created_at||'').slice(0,10))}</div>`).join('')||'<div class="kv">—</div>';
  const nb=(m.neighbors||[]).map(n=>`<div class="kv" style="cursor:pointer" onclick="openD('${n.id}')">· <span style="color:${tcolor(n.type)}">【${esc(n.type)}】</span>${esc(n.claim).slice(0,48)} <span style="color:var(--faint)">(${n.sim})</span></div>`).join('')||'<div class="kv">—</div>';
  const RELC={'矛盾':'#d9534f','取代':'#e08a1e','被取代':'#e08a1e','重复':'#9aa0ad'};
  const lk=(m.links||[]).map(l=>`<div class="kv" style="cursor:pointer" onclick="openD('${l.id}')">· <span style="color:${RELC[l.rel]||'#888'};font-weight:600">[${esc(l.rel)}]</span> ${esc((l.claim||l.id||'').slice(0,52))}${l.superseded?' <span style="color:var(--faint)">(已被取代)</span>':''}</div>`).join('');
  $('#mbody').innerHTML=`<div class="top" style="display:flex;gap:8px;align-items:center">${chip(m.type)}${statusPill(m.status)}${cf(m.confidence)}</div>
    <h2>${esc(m.claim)}</h2>
    ${m.context?`<div class="kv" style="margin:-4px 0 8px;color:var(--mut)">🧭 情境:${esc(m.context)}</div>`:''}
    <div class="sec-t">证据(逐字原文)</div><div class="ev" style="font-size:13px">${esc(m.evidence)}</div>
    <div style="margin-top:6px"><button class="btn" onclick="showSource('${m.id}')">看原文上下文</button></div><div id="srcCtx"></div>
    <div class="kv" style="margin-top:10px">时效:${esc(m.valid_from||'—')} → ${esc(m.valid_until||'现行')} · 再审 ${esc(m.review_date||'—')}</div>
    ${lk?`<div class="sec-t">🔀 策展关系(矛盾/演化/重复 · 点击跳转)</div>${lk}`:''}
    <div class="sec-t">🔗 语义近邻(最相关的记忆 · 点击跳转)</div>${nb}
    <div class="sec-t">来源 / 溯源</div>${prov}
    <div class="sec-t">修订史</div>${revs}
    ${lifeButtons(m)}`;
  $('#ov').classList.add('show');
}
async function showSource(id){                      // 拉整段原对话并高亮证据
  const box=$('#srcCtx'); if(!box)return;
  box.innerHTML='<div class="kv" style="color:var(--faint)">加载原文…</div>';
  try{
    const s=await api('/api/memory/'+encodeURIComponent(id)+'/source');
    if(!s.text){ box.innerHTML='<div class="kv" style="color:var(--faint)">（未找到对应原对话）</div>'; return; }
    const p=s.evidence_start;
    const html=(p>=0)
      ? esc(s.text.slice(0,p))+'<mark>'+esc(s.text.slice(p,p+s.evidence_len))+'</mark>'+esc(s.text.slice(p+s.evidence_len))
      : esc(s.text);
    box.innerHTML=`<div class="kv" style="color:var(--faint);margin:6px 0">${esc(s.source||'')} · <code>${esc((s.conv_id||'').slice(0,16))}</code></div>`
      +`<div class="ev" style="font-size:12.5px;max-height:360px;overflow:auto;white-space:pre-wrap;line-height:1.6">${html}</div>`;
  }catch(e){ box.innerHTML='<div class="kv" style="color:var(--faint)">加载失败</div>'; }
}
function lifeButtons(m){
  const cur=!m.valid_until;
  let btns='';
  if(cur){
    if(m.status!=='已确认')btns+=`<button class="btn ok" onclick="lifeAct('${m.id}','enable')">✓ 确认为「已确认」</button> `;
    btns+=`<button class="btn" onclick="lifeAct('${m.id}','sleep')">💤 休眠(可恢复)</button>`;
  }else{
    btns+=`<button class="btn pri" onclick="lifeAct('${m.id}','wake')">⤴ 唤醒(恢复现行)</button>`;
  }
  return `<div class="sec-t">生命周期</div>`
    +`<div class="kv" style="color:var(--faint);margin-bottom:6px">待核=自动提纯·未经你确认(仍在召回)· 已确认=你背书过(+权重)· 休眠/已被取代=不再召回(可唤醒·从不删除)</div>`
    +`<div class="toolbar">${btns}</div>`;
}
async function lifeAct(id,action){
  try{const r=await post('/api/memory/'+encodeURIComponent(id)+'/'+action,{});
    if(r.ok){openD(id);if(typeof bp!=='undefined')doBrowse(bp);}else alert('操作失败');
  }catch(e){alert('失败:'+e.message);}
}
function closeModal(){$('#ov').classList.remove('show');}
$('#ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});

const QSC={approve:['确认入库','#0d9488'],downgrade:['降级待核','#d97706'],reject:['拒绝','#d9534f']};
function clCard(c){
  const sc=QSC[c.suggest]||QSC.downgrade;
  const more=c.size>c.claims.length?` …共 ${c.size} 条`:'';
  const qj=JSON.stringify(c.qids);
  return `<div class="mcard" style="--cl:${sc[1]};cursor:default">
    <div class="top"><span class="pill" style="background:${sc[1]}1a;color:${sc[1]}">建议 ${esc(sc[0])}</span> <b>${esc(c.theme||'')}</b> <span style="color:var(--faint)">×${c.size}${c.why?' · '+esc(c.why):''}</span></div>
    <div class="kv">${c.claims.map(q=>'· '+esc(q.slice(0,72))).join('<br>')}${more}</div>
    <div class="toolbar" style="margin-top:10px">
      <button class="btn ${c.suggest==='approve'?'ok':''}" onclick='qBulk(${qj},"approve",this)'>✓ 确认入库</button>
      <button class="btn ${c.suggest==='downgrade'?'pri':''}" onclick='qBulk(${qj},"downgrade",this)'>↓ 降级待核</button>
      <button class="btn ${c.suggest==='reject'?'dng':''}" onclick='qBulk(${qj},"reject",this)'>✕ 拒绝</button>
    </div></div>`;
}
async function qBulk(qids,action,btn){btn.disabled=true;btn.textContent='处理中…';
  try{await post('/api/queue/bulk',{qids,action});renderQueue();}
  catch(e){btn.disabled=false;alert('失败:'+e.message);}}
async function renderQueue(){
  const [d,cl]=await Promise.all([api('/api/queue'),api('/api/queue/clusters').catch(()=>({clusters:[]}))]);
  const v=$('#view-queue');
  const nc=d.items.filter(x=>x.reason==='contradiction').length;
  let h=`<div class="head"><h1>待确认队列</h1><p>高影响(定价/方向/收入)、AI 推断或<b>矛盾</b>条目,你是最后一道闸。${nc?`其中 <b>${nc}</b> 条矛盾:并排显示冲突双方,由你裁决(保留一方=另一方置失效留痕,不硬删)。`:''}</p></div>`;
  let handled=new Set();
  if(cl.clusters&&cl.clusters.length){
    const by=s=>cl.clusters.filter(x=>x.suggest===s);
    const qof=arr=>arr.flatMap(x=>x.qids);
    const rj=by('reject'),dg=by('downgrade'),ap=by('approve');
    const rjq=qof(rj),dgq=qof(dg);
    rjq.concat(dgq).forEach(q=>handled.add(q));
    h+=`<div class="panel"><h3>🧩 AI 预审 · 一键瘦身队列</h3>`
      +`<div class="kv" style="margin-bottom:10px">AI 已预审 <b>${cl.clusters.reduce((a,x)=>a+x.size,0)}</b> 条:建议 <b style="color:#d9534f">拒绝 ${rjq.length}</b>、<b style="color:#d97706">降级待核 ${dgq.length}</b>(移出队列、仍作普通记忆保留)、<b style="color:#0d9488">确认 ${qof(ap).length}</b>。先一键处理前两类,余下逐条复核。</div>`
      +`<div class="toolbar" style="margin-bottom:8px">`
      +(dgq.length?`<button class="btn pri" onclick='qBulk(${JSON.stringify(dgq)},"downgrade",this)'>↓ 降级 ${dgq.length} 条为待核</button> `:'')
      +(rjq.length?`<button class="btn dng" onclick='qBulk(${JSON.stringify(rjq)},"reject",this)'>✕ 拒绝 ${rjq.length} 条</button>`:'')
      +`</div>`
      +(rj.length+dg.length?`<details><summary style="cursor:pointer;color:var(--mut);font-size:13px">展开眼检「拒绝/降级」的 ${rj.length+dg.length} 簇(也可逐簇改判)</summary><div class="list" style="margin-top:8px">`
        +rj.concat(dg).map(clCard).join('')+`</div></details>`:'')
      +`</div>`;
  }
  const items=d.items.filter(x=>!handled.has(x.qid));
  if(!items.length){v.innerHTML=h+`<div class="empty" style="padding:30px 16px">🎉 没有待你确认的记忆<div style="margin-top:8px;font-size:13px;color:var(--mut);line-height:1.6">导入 Claude 记忆后,AI 推断出的条目会自动汇到这里,等你逐条批准入库。</div><button class="btn pri" style="margin-top:14px" onclick="show('import')">去导入记忆 →</button></div>`;return;}
  h+=`<div class="sec-t" style="margin-top:18px">逐条复核(AI 建议确认 + 矛盾裁决 · ${items.length} 条)</div>`;
  h+='<div class="list">'+items.map(x=>{
    if(x.reason==='contradiction'){return `<div class="mcard" style="--cl:#d9534f;cursor:default">
      <div class="top"><span class="pill ai" style="background:#fbe9e7;color:#c0392b">⚠ 矛盾 · 待裁决</span></div>
      <div class="claim">① ${esc(x.claim)} <span style="color:var(--faint)">(${x.confidence??'—'})</span></div>
      <div class="claim" style="margin-top:6px">② ${esc(x.other_claim||'(对方条目缺失)')} <span style="color:var(--faint)">(${x.other_confidence??'—'})</span></div>
      <div class="toolbar" style="margin:12px 0 0">
        <button class="btn ok" onclick="qAct('${x.qid}','keep_this',this)">保留① 取代②</button>
        <button class="btn ok" onclick="qAct('${x.qid}','keep_other',this)">保留② 取代①</button>
        <button class="btn" onclick="qAct('${x.qid}','coexist',this)">都保留(并存)</button></div></div>`;}
    return `<div class="mcard" style="--cl:${tcolor(x.type)};cursor:default">
      <div class="top">${chip(x.type)}<span class="pill ai">${esc(x.reason)}</span>${cf(x.confidence)}</div>
      ${x.context?`<div class="kv" style="color:var(--mut);margin-bottom:4px">🧭 ${esc(x.context)}</div>`:''}
      <div class="claim">${esc(x.claim)}</div><div class="ev">${esc((x.evidence||'').slice(0,220))}</div>
      <div class="toolbar" style="margin:12px 0 0"><button class="btn ok" onclick="qAct('${x.qid}','approve',this)">✓ 批准入库</button>
      <button class="btn dng" onclick="qAct('${x.qid}','reject',this)">✕ 丢弃</button></div></div>`;}).join('')+'</div>';
  v.innerHTML=h;
}
async function qAct(qid,act,btn){btn.disabled=true;btn.textContent='处理中…';

// ---- 地图(force-graph:canvas 物理力导向 + 语义缩放 LOD)----
const CPAL=['#5b50e6','#0d9488','#2563eb','#d97706','#db2777','#059669','#0891b2','#9333ea','#dc2626','#ca8a04','#0ea5e9','#e11d48','#7c3aed','#16a34a'];
const ccolor=i=>i<0?'#9aa0ad':CPAL[i%CPAL.length];
const MSCALE=1500, MK0=1.15;
let mapS={data:null,fg:null,built:false,q:'',hi:new Set(),hiL:new Set(),base:new Set(),baseL:new Set(),search:null,focus:null,hoverNode:null,hideIso:false,adj:{},occ:[],_rsz:false};
async function renderMap(){
  const v=$('#view-map');
  if(!mapS.data){
    v.innerHTML='<div class="head"><h1>记忆地图</h1></div><div class="empty">聚类 + 布局计算中…(首次约 1–2 秒)</div>';
    let d; try{d=await api('/api/map');}catch(e){v.innerHTML='<div class="head"><h1>记忆地图</h1></div><div class="empty">加载失败:'+esc(e.message)+'</div>';return;}
    if(!d.points||!d.points.length){v.innerHTML='<div class="head"><h1>记忆地图</h1></div><div class="empty">'+esc(d.note||'记忆太少')+'</div>';return;}
    mapS.data=d; mapS.built=false; mapS.fg=null;
  }
  if(!mapS.built||!document.getElementById('fg'))buildMapShell();
  else{const el=document.getElementById('fg');if(mapS.fg)mapS.fg.width(el.clientWidth).height(el.clientHeight);}
}
function buildMapShell(){
  const d=mapS.data;
  const leg=d.clusters.slice().sort((a,b)=>b.size-a.size).map(cl=>`<span class="chip" onclick="mapGoCluster(${cl.id})" style="cursor:pointer;background:${ccolor(cl.id)}1a;color:${ccolor(cl.id)}">${esc(cl.label)} ${cl.size}</span>`).join(' ');
  $('#view-map').innerHTML=`<div class="head" style="margin-bottom:8px"><h1>记忆地图</h1><p>一张语义星图 · ${d.count} 条记忆 / ${d.clusters.length} 主题 · 离群 ${d.isolated}。相近的记忆自动聚成星团,越亮越确信。</p></div>
  <div class="panel" style="padding:9px 14px;margin-bottom:10px"><div class="toolbar"><input type="text" id="mq" placeholder="搜词(如 定价、小红书)→ 结果列表 + 图上定位" value="${esc(mapS.q)}" onkeydown="if(event.key==='Enter')mapSearch(this.value)"><button class="btn" onclick="mapSearch($('#mq').value)">搜索</button>${mapS.q?`<button class="btn" onclick="mapSearch('')">清除</button>`:''}<button class="btn" onclick="mapReset()">复位视图</button>${d.isolated>0?`<button class="btn" id="isoBtn" onclick="mapToggleIso()">隐藏离群 ${d.isolated}</button>`:''}</div>
  <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--mut)"><span>🖱️ 滚轮缩放</span><span>✋ 拖拽平移</span><span>👆 悬浮看内容 · 点击顺藤摸瓜</span><span>⛶ 可全屏</span></div>
  <div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:6px;max-height:60px;overflow:auto">${leg}</div></div>
  <div id="mapRes"></div>
  <div id="mapWrap" style="position:relative;height:78vh;min-height:420px;background:#fbfbfd;border:1px solid var(--bd);border-radius:10px;overflow:hidden">
    <button class="btn" style="position:absolute;top:10px;right:10px;z-index:5" onclick="mapFull()">⛶ 全屏</button>
    <div id="mapPulse" style="position:absolute;left:0;top:0;pointer-events:none;z-index:3;display:none;border:2px solid #5b50e6;border-radius:50%;animation:mhpulse 1.5s ease-out infinite"></div>
    <div id="mapTip" style="position:absolute;left:0;top:0;pointer-events:none;z-index:4;display:none;max-width:260px;background:rgba(20,22,30,.93);color:#fff;border-radius:9px;padding:8px 11px;box-shadow:0 6px 20px rgba(0,0,0,.28);transform:translate(-50%,-100%)"></div>
    <div id="fg" style="width:100%;height:100%"></div>
  </div>`;
  initFG(); mapS.built=true;
  if(mapS.q)applySearch(false);
}
function lkey(l){const a=typeof l.source==='object'?l.source.id:l.source,b=typeof l.target==='object'?l.target.id:l.target;return a<b?a+'-'+b:b+'-'+a;}
function fgAnchor(strength){let ns;function f(alpha){for(const n of ns){if(n.sx!=null){n.vx+=(n.sx-n.x)*strength*alpha;n.vy+=(n.sy-n.y)*strength*alpha;}}}f.initialize=n=>{ns=n;};return f;}
function nodeR(conf){const x=Math.max(0,Math.min(1,((conf==null?0.4:conf)-0.2)/0.65));return 2.2+x*3.4;}
function initFG(){
  const d=mapS.data,P=d.points,el=document.getElementById('fg');
  const nodes=P.map((p,i)=>({id:'p'+i,idx:i,t:'pt',cluster:p.cluster,claim:p.claim,conf:p.confidence,sx:p.x*MSCALE,sy:(1-p.y)*MSCALE,x:p.x*MSCALE,y:(1-p.y)*MSCALE}));
  // 簇质心节点:fx/fy 固定 → 主题标签当稳定地标,不漂
  d.clusters.forEach(c=>nodes.push({id:'c'+c.id,t:'cl',cluster:c.id,label:c.label,size:c.size,x:c.x*MSCALE,y:(1-c.y)*MSCALE,fx:c.x*MSCALE,fy:(1-c.y)*MSCALE}));
  const links=[],seen=new Set();mapS.adj={};
  P.forEach((p,i)=>{(p.nbr||[]).forEach(([j,s])=>{const a=Math.min(i,j),b=Math.max(i,j),k=a+'-'+b;if(seen.has(k))return;seen.add(k);links.push({source:'p'+a,target:'p'+b,sim:s});(mapS.adj['p'+a]=mapS.adj['p'+a]||[]).push('p'+b);(mapS.adj['p'+b]=mapS.adj['p'+b]||[]).push('p'+a);});});
  const fg=new ForceGraph(el).width(el.clientWidth).height(el.clientHeight).backgroundColor('#fbfbfd')
    .graphData({nodes,links}).nodeRelSize(1).warmupTicks(20).cooldownTicks(220).d3VelocityDecay(0.32).enableNodeDrag(true).nodeVisibility(mapVisible)
    .onNodeDragEnd(n=>{if(n.t!=='cl'){n.fx=null;n.fy=null;}})
    .linkColor(l=>{if(mapS.hi.size)return mapS.hiL.has(lkey(l))?'rgba(110,110,135,.55)':'rgba(180,182,195,.04)';return 'rgba(170,172,185,.14)';})
    .linkWidth(l=>mapS.hi.size&&mapS.hiL.has(lkey(l))?1.6:0.5)
    .nodeCanvasObjectMode(()=>'replace')
    .nodeCanvasObject((n,ctx,scale)=>drawFGNode(n,ctx,scale))
    .nodePointerAreaPaint((n,color,ctx)=>fgPointerArea(n,color,ctx))
    .onRenderFramePost((ctx,scale)=>{drawFGLabels(ctx,scale);updateMapOverlays();})
    .onNodeHover(n=>fgHover(n)).onNodeClick(n=>fgClick(n))
    .onBackgroundClick(()=>mapClearSel());
  fg.d3Force('center',null);
  fg.d3Force('charge').strength(-45).distanceMax(320);
  fg.d3Force('link').distance(l=>30+(1-(l.sim||0.5))*50).strength(0.3);
  fg.d3Force('anchor',fgAnchor(0.05));   // 弱锚:点不再钉成网格,但离群点不飞走
  mapS.fg=fg;
  setTimeout(()=>fg.zoomToFit(500,50),600);
  if(!mapS._rsz){mapS._rsz=true;
    window.addEventListener('resize',()=>{const e=document.getElementById('fg');if(e&&mapS.fg)mapS.fg.width(e.clientWidth).height(e.clientHeight);});
    document.addEventListener('fullscreenchange',()=>{const e=document.getElementById('fg');if(e&&mapS.fg)setTimeout(()=>mapS.fg.width(e.clientWidth).height(e.clientHeight),80);});
  }
}
function fgCR(n){return n.t==='cl'?Math.max(11,Math.sqrt(n.size)*2.3):nodeR(n.conf)*(n.id===mapS.focus?1.8:1);}
function drawFGNode(n,ctx,scale){   // 只画圆/光晕,标签在 onRenderFramePost 单独层画(保证字在最上、不被圆盖)
  const dim=mapS.hi.size&&!mapS.hi.has(n.id);
  if(n.t==='cl'){
    const fade=Math.max(0,1-(scale-0.5)/2.6);
    if(fade>0.04){ctx.globalAlpha=fade;ctx.beginPath();ctx.arc(n.x,n.y,fgCR(n),0,6.283);ctx.fillStyle=ccolor(n.cluster)+'22';ctx.fill();ctx.globalAlpha=1;}
    return;
  }
  const foc=n.id===mapS.focus,r=fgCR(n);
  ctx.globalAlpha=dim?0.1:1;ctx.beginPath();ctx.arc(n.x,n.y,r,0,6.283);ctx.fillStyle=n.cluster<0?'#b9bdc7':ccolor(n.cluster);ctx.fill();
  if(foc||(mapS.hi.size&&mapS.hi.has(n.id))){ctx.lineWidth=1.7/scale;ctx.strokeStyle='#fff';ctx.stroke();}
  ctx.globalAlpha=1;
}
function fgPointerArea(n,color,ctx){   // 命中区=圆(不含标签)→ 标签旁空白不误判为节点,点空白可取消
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(n.x,n.y,fgCR(n)+(n.t==='cl'?0:2),0,6.283);ctx.fill();
}
function fgLabel(ctx,scale,n,occ,cluster){
  const txt=cluster?n.label:(n.claim||'').slice(0,16);
  if(!txt)return false;
  const fs=cluster?Math.max(12,15/scale):Math.max(11,13/scale);
  ctx.font=`${cluster?'600 ':''}${fs}px -apple-system,"PingFang SC",system-ui,sans-serif`;
  const w=ctx.measureText(txt).width, r=fgCR(n);
  const lx=n.x, ly=cluster?n.y:(n.y-r-fs*0.5);
  const box={x:lx-w/2-3,y:(cluster?ly-fs/2:ly-fs)-2,w:w+6,h:fs+5};
  for(const o of occ){if(!(box.x>o.x+o.w||box.x+box.w<o.x||box.y>o.y+o.h||box.y+box.h<o.y))return false;}
  occ.push(box);
  ctx.textAlign='center';ctx.textBaseline=cluster?'middle':'alphabetic';
  ctx.lineWidth=(cluster?3.6:3.2)/scale;ctx.strokeStyle='#fff';ctx.strokeText(txt,lx,ly);
  ctx.fillStyle=cluster?ccolor(n.cluster):'#1c1d22';ctx.fillText(txt,lx,ly);
  return true;
}
function drawFGLabels(ctx,scale){   // 独立标签层:优先级排序 + 屏内碰撞去重 + 封顶,字永远在圆之上
  if(!mapS.fg)return;
  const nodes=mapS.fg.graphData().nodes, occ=[]; let drawn=0;
  const clusters=[],hiPts=[],normPts=[]; let focusNodeObj=null;
  for(const n of nodes){
    if(n.t==='cl'){clusters.push(n);continue;}
    if(mapS.focus&&n.id===mapS.focus){focusNodeObj=n;continue;}
    if(mapS.hi.size&&mapS.hi.has(n.id))hiPts.push(n);
    else if(scale>=MK0&&!mapS.hi.size&&!(n.cluster<0&&mapS.hideIso))normPts.push(n);
  }
  hiPts.sort((a,b)=>(b.conf||0)-(a.conf||0)); normPts.sort((a,b)=>(b.conf||0)-(a.conf||0));
  for(const c of clusters)fgLabel(ctx,scale,c,occ,true);          // 主题地标优先占位
  const pts=(focusNodeObj?[focusNodeObj]:[]).concat(hiPts,normPts);
  for(const n of pts){if(drawn>=40)break;if(fgLabel(ctx,scale,n,occ,false))drawn++;}
}
function setMapTipContent(n){   // 悬浮卡内容(悬浮时设一次,不逐帧改)
  const tip=document.getElementById('mapTip');if(!tip||!mapS.data)return;
  const p=mapS.data.points[n.idx];if(!p)return;
  const cl=(p.claim||''),nb=(p.nbr||[]).length;
  tip.innerHTML=`<div style="font-weight:600;font-size:12.5px;line-height:1.4">${esc(cl.slice(0,60))}${cl.length>60?'…':''}</div>`
    +`<div style="opacity:.82;font-size:11px;margin-top:3px">${esc(p.type||'')} · 置信 ${p.confidence!=null?Number(p.confidence).toFixed(2):'—'} · ${nb} 个关联</div>`
    +`<div style="opacity:.6;font-size:10.5px;margin-top:3px">点击 → 聚焦并顺藤摸瓜</div>`;
}
function updateMapOverlays(){   // 悬浮卡 + 聚焦脉冲环:DOM 覆盖层(CSS 自跑动画),空闲零开销、不逐帧重绘 canvas
  if(!mapS.fg)return;
  const tip=document.getElementById('mapTip'),n=mapS.hoverNode;
  if(tip){
    if(!n||n.t==='cl'||n.x==null){if(tip.style.display!=='none')tip.style.display='none';}
    else{const sc=mapS.fg.graph2ScreenCoords(n.x,n.y);tip.style.left=sc.x+'px';tip.style.top=(sc.y-fgCR(n)*mapS.fg.zoom()-7)+'px';if(tip.style.display!=='block')tip.style.display='block';}
  }
  const ring=document.getElementById('mapPulse');
  if(ring){
    const fn=mapS.focus?mapS.fg.graphData().nodes.find(x=>x.id===mapS.focus):null;
    if(fn&&fn.x!=null){const sc=mapS.fg.graph2ScreenCoords(fn.x,fn.y),d=Math.max(16,fgCR(fn)*mapS.fg.zoom()*2.1);ring.style.left=sc.x+'px';ring.style.top=sc.y+'px';ring.style.width=d+'px';ring.style.height=d+'px';ring.style.borderColor=(fn.cluster<0?'#5b50e6':ccolor(fn.cluster));if(ring.style.display!=='block')ring.style.display='block';}
    else if(ring.style.display!=='none')ring.style.display='none';
  }
}
function fgHover(n){
  const e=document.getElementById('fg');
  mapS.hoverNode=(n&&n.t!=='cl')?n:null;                            // 悬浮卡:无论是否锁定选中都显示
  if(mapS.hoverNode)setMapTipContent(mapS.hoverNode);
  else{const t=document.getElementById('mapTip');if(t)t.style.display='none';}
  if(mapS.focus){if(e)e.style.cursor=n?'pointer':'grab';return;}   // 已点选锁定:悬浮不改高亮,只有点空白才清
  if(!n){mapS.hi=new Set(mapS.base);mapS.hiL=new Set(mapS.baseL);if(e)e.style.cursor='grab';return;}
  const hi=new Set([n.id]),hiL=new Set();(mapS.adj[n.id]||[]).forEach(m=>{hi.add(m);hiL.add(n.id<m?n.id+'-'+m:m+'-'+n.id);});
  mapS.hi=hi;mapS.hiL=hiL;if(e)e.style.cursor='pointer';
}
function setBase(hi,hiL){mapS.base=hi||new Set();mapS.baseL=hiL||new Set();mapS.hi=new Set(mapS.base);mapS.hiL=new Set(mapS.baseL);}
function fgClick(n){
  if(!n)return;
  if(n.t==='cl'){mapGoCluster(n.cluster);return;}
  mapS.focus=n.id;mapS.search=null;
  const hi=new Set([n.id]),hiL=new Set();(mapS.adj[n.id]||[]).forEach(m=>{hi.add(m);hiL.add(n.id<m?n.id+'-'+m:m+'-'+n.id);});setBase(hi,hiL);
  mapS.fg.centerAt(n.x,n.y,600);mapS.fg.zoom(Math.max(2.4,mapS.fg.zoom()),600);updateMapOverlays();
  const P=mapS.data.points,p=P[n.idx];
  const nbl=(p.nbr||[]).map(([j,s])=>`<span class="chip" style="cursor:pointer;background:${ccolor(P[j].cluster)}1a;color:${ccolor(P[j].cluster)}" onclick="fgFocusIdx(${j})">${esc(P[j].claim).slice(0,20)} · ${s}</span>`).join(' ')||'<span style="color:var(--faint)">无近邻</span>';
  $('#mapRes').innerHTML=`<div class="panel" style="padding:12px 14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><b>${esc(p.claim).slice(0,72)}</b><div class="kv" style="margin-top:3px">${esc(p.type)} · 置信 ${p.confidence!=null?Number(p.confidence).toFixed(2):'—'}</div></div><div style="white-space:nowrap"><button class="btn pri" onclick="openD('${p.id}')">看详情</button> <button class="btn" onclick="mapReset()">← 返回</button></div></div><div class="kv" style="margin-top:8px">关联最高(点它换中心,顺藤摸瓜):</div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">${nbl}</div></div>`;
}
function fgFocusIdx(i){const n=mapS.fg.graphData().nodes.find(x=>x.id==='p'+i);if(n)fgClick(n);}
function mapGoCluster(cid){
  if(!mapS.fg)return;
  const ns=mapS.fg.graphData().nodes.filter(n=>n.t==='pt'&&n.cluster===cid);if(!ns.length)return;
  mapS.focus=null;mapS.search=null;$('#mapRes').innerHTML='';
  setBase(new Set(ns.map(n=>n.id)),new Set());
  const xs=ns.map(n=>n.x),ys=ns.map(n=>n.y);
  mapS.fg.centerAt((Math.min(...xs)+Math.max(...xs))/2,(Math.min(...ys)+Math.max(...ys))/2,600);mapS.fg.zoom(2.1,600);
}
function mapClearSel(){mapS.focus=null;mapS.search=null;mapS.hoverNode=null;setBase(new Set(),new Set());$('#mapRes').innerHTML='';const i=$('#mq');if(i&&!mapS.q)i.value='';updateMapOverlays();}  // 点空白:只清选中,保留缩放位置
function mapReset(){mapClearSel();if(mapS.fg)mapS.fg.zoomToFit(500,50);}  // 复位视图/返回:清选中 + 缩放回全局
function mapVisible(n){return n.t!=='pt'||n.cluster>=0||!mapS.hideIso;}   // 隐藏离群时:无主题归属的离群点隐去(簇心/有主题点始终显示)
function mapToggleIso(){
  mapS.hideIso=!mapS.hideIso;
  const b=$('#isoBtn');if(b)b.textContent=mapS.hideIso?'显示离群点':'隐藏离群 '+(mapS.data?mapS.data.isolated:'');
  if(mapS.fg)mapS.fg.nodeVisibility(mapVisible);   // 重设访问器→强制重算可见性并重绘
}
function mapFull(){const w=document.getElementById('mapWrap');if(!w)return;if(!document.fullscreenElement)w.requestFullscreen&&w.requestFullscreen();else document.exitFullscreen&&document.exitFullscreen();}
function mapSearch(s){mapS.q=(s||'').trim();applySearch(true);}
function applySearch(refresh){
  const q=mapS.q;
  if(!q){mapS.search=null;setBase(new Set(),new Set());$('#mapRes').innerHTML='';const i=$('#mq');if(i)i.value='';if(refresh&&mapS.fg)mapS.fg.zoomToFit(400,50);return;}
  const P=mapS.data.points,hits=[];P.forEach((p,i)=>{if(p.claim&&p.claim.includes(q))hits.push(i);});
  mapS.search=new Set(hits.map(i=>'p'+i));mapS.focus=null;setBase(new Set(mapS.search),new Set());
  const list=hits.slice(0,80).map(i=>{const p=P[i];return `<div class="kv" style="cursor:pointer;padding:5px 2px;border-bottom:0.5px solid var(--bd)" onclick="fgFocusIdx(${i})"><span style="color:${ccolor(p.cluster)}">【${esc(p.type)}】</span>${esc(p.claim).slice(0,54)} <span style="color:var(--faint)">${p.confidence!=null?Number(p.confidence).toFixed(2):''}</span></div>`;}).join('')||'<div class="kv">无命中,换个词。</div>';
  $('#mapRes').innerHTML=`<div class="panel" style="padding:12px 14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center"><b>搜「${esc(q)}」命中 ${hits.length} 条 —— 点一条飞到它</b><button class="btn" onclick="mapSearch('')">清除</button></div><div style="margin-top:8px;max-height:200px;overflow:auto">${list}</div></div>`;
  if(mapS.fg&&hits.length){const hs=mapS.fg.graphData().nodes.filter(n=>mapS.search.has(n.id));if(hs.length){const xs=hs.map(n=>n.x),ys=hs.map(n=>n.y);mapS.fg.centerAt((Math.min(...xs)+Math.max(...xs))/2,(Math.min(...ys)+Math.max(...ys))/2,600);mapS.fg.zoom(hs.length<4?3:1.7,600);}}
}

   <div class="metrics">
     <div class="metric"><div class="ico"><svg style="width:30px;height:30px"><use href="#mh"/></svg></div><div class="v">${d.current}</div><div class="l">现行记忆</div></div>
     <div class="metric"><div class="ico">⚠️</div><div class="v">${d.low_conf}</div><div class="l">低置信(&lt;0.45)</div></div>

const KIND={'矛盾':{c:'--dng',s:'--dng-soft',e:'⚖️',t:'这是一次观点对立'},'演化':{c:'--warn',s:'--warn-soft',e:'🔀',t:'这是一条演化线'},'精炼':{c:'--info',s:'--info-soft',e:'🎯',t:'方向没变,越来越细'},'一致':{c:'--ok',s:'--ok-soft',e:'✓',t:'你的看法基本一致'}};

async function runRetro(q){
  q=(q||'').trim();if(!q)return;
  const rt=$('#rtq');if(rt)rt.value=q;
  const out=$('#retro-out');out.innerHTML=`<div class="panel" style="padding:22px;text-align:center;color:var(--mut)">正在复盘「${esc(q)}」… 读取相关记忆 + 梳理时间线与张力(约几秒)</div>`;
  let d;try{d=await api('/api/retrospect?q='+encodeURIComponent(q));}catch(e){out.innerHTML=`<div class="panel" style="padding:16px;color:var(--dng)">复盘失败:${esc(e.message)}</div>`;return;}
  if(d.empty){out.innerHTML=`<div class="empty">没找到和「${esc(q)}」相关的记忆,换个说法试试?</div>`;return;}
  out.innerHTML=retroReport(d);
}
function retroReport(d){
  const k=KIND[d.kind]||{c:'--mut',s:'--bg',e:'🕮',t:d.kind||'复盘'};
  const turns={};(d.turns||[]).forEach(t=>{turns[t.after]=t.why;});
  let tl='';
  d.timeline.forEach((t,i)=>{const su=t.superseded;
    tl+=`<div style="display:flex;gap:12px">
      <div style="flex:0 0 12px;display:flex;flex-direction:column;align-items:center"><span style="width:9px;height:9px;border-radius:50%;background:${su?'transparent':'var(--mut)'};border:1.5px solid var(--mut);margin-top:4px"></span><span style="width:2px;flex:1;background:var(--bd);margin-top:4px"></span></div>
      <div style="flex:1;padding-bottom:${turns[i]!==undefined?'4px':'14px'}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span style="font-size:12px;color:var(--faint)">${esc(t.date||'?')}</span><span style="font-size:11px;padding:1px 7px;border-radius:6px;background:var(--bg);color:var(--mut);border:0.5px solid var(--bd)">${esc(t.type)}</span>${su?'<span style="font-size:11px;color:var(--faint)">已被取代</span>':''}</div>
        <div style="font-size:14.5px;line-height:1.5;cursor:pointer;${su?'color:var(--faint)':''}" onclick="openD('${t.id}')">${esc(t.claim)}</div>
      </div></div>`;
    if(turns[i]!==undefined)tl+=`<div style="display:flex;gap:12px"><div style="flex:0 0 12px;display:flex;justify-content:center"><span style="width:2px;flex:1;background:var(--bd)"></span></div><div style="flex:1;padding:2px 0 14px"><span style="font-size:13px;color:var(${k.c});background:var(${k.s});border-radius:8px;padding:6px 10px;display:inline-block">↳ 想法在这里变了 —— ${esc(turns[i])}</span></div></div>`;
  });
  const tension=d.tension?`<div class="panel" style="padding:12px 14px;margin-top:8px;border-left:3px solid var(${k.c})">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px"><span style="background:var(--bg);border:0.5px solid var(--bd);border-radius:6px;padding:5px 12px;font-size:13px">${esc(d.tension.a)}</span><span style="color:var(--faint)">⇄</span><span style="background:var(--bg);border:0.5px solid var(--bd);border-radius:6px;padding:5px 12px;font-size:13px">${esc(d.tension.b)}</span></div>
    <div style="font-size:13.5px;color:var(--mut);line-height:1.6">${esc(d.tension.note||'')}</div></div>`:'';
  const qs=(d.questions||[]).map(x=>`<li style="margin:5px 0">${esc(x)}</li>`).join('');
  return `<div class="panel" style="padding:14px 16px">
    <div style="display:inline-flex;align-items:center;gap:7px;background:var(${k.s});color:var(${k.c});font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px;margin-bottom:10px">${k.e} ${esc(d.kind||'复盘')} · ${esc(k.t)}</div>
    ${d.summary?`<p style="font-size:16px;line-height:1.6;margin:0 0 16px">${esc(d.summary)}</p>`:''}
    <div style="margin:6px 0 4px">${tl}</div>
    ${tension}
    ${qs?`<div class="panel" style="padding:12px 14px;margin-top:10px;background:var(--bg)"><div style="font-size:14px;font-weight:500;margin-bottom:6px">❓ 这几个问题,你自己判断(它不替你定)</div><ol style="margin:0;padding-left:1.2rem;font-size:14px;line-height:1.7">${qs}</ol></div>`:''}
    <div style="font-size:12px;color:var(--faint);margin-top:10px">共 ${d.count} 条相关记忆 · 点任一条看逐字证据与来源${d.error?' · (合成降级:'+esc(d.error)+')':''}</div>
  </div>`;
}

  try{const u=await api('/api/update-check');
    $('#ver').textContent=u.current||'?';
    if(u.update_available){$('#upd').innerHTML=` · <span style="color:var(--dng)">发现新版 ${esc(u.latest)}</span> <button class="btn pri" style="height:28px;padding:0 12px;margin-left:4px" onclick="doUpdate(this)">立即更新</button> <a href="${esc(u.url||'#')}" target="_blank" rel="noopener" style="font-size:12px;color:var(--mut)">更新日志</a>`;const p=$('#upip');if(p)p.style.display='inline-block';}
    else if(u.latest){$('#upd').innerHTML=' · <span style="color:var(--ok)">已是最新</span>';}
  }catch(e){$('#ver').textContent='?';}
  try{const c=await api('/api/connect-info');
    $('#conn').innerHTML='<div style="font-size:13px;line-height:1.9;margin-bottom:6px;color:var(--tx)">'
        +'<b>Claude Code / Claude 桌面端</b>:装下面①②的 MCP,直接能调 <code>recall_memory</code>。<br>'
        +'<b>ChatGPT 桌面端</b>:在其 Connectors / 开发者模式里加同一个 MCP(命令与②相同)。<br>'
        +'<b>ChatGPT 网页版 / 不支持 MCP 的平台</b>:把③的指令放进「自定义指令」;或用面板「召回」查到记忆后复制粘进对话。<br>'
        +'<b>Codex</b>:🚧 计划中。</div>'
      +_block('① Claude 桌面端 MCP 配置(合并进 claude_desktop_config.json)',JSON.stringify(c.mcp_json,null,2))
      +_block('② 命令行一键(Claude Code / ChatGPT 桌面端)',c.cli_command)
      +_block('③「主动读取」指令(贴进 Claude Project / ChatGPT 自定义指令)',c.instruction);
  }catch(e){$('#conn').innerHTML='<div class="empty">读取接入信息失败</div>';}
}

// ---- 路由 ----
const R={dash:renderDash,browse:renderBrowse,recall:renderRecall,map:renderMap,retro:renderRetro,queue:renderQueue,import:renderImport,settings:renderSettings};
function show(v){
  document.querySelectorAll('.navi').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  ['dash','browse','recall','map','retro','queue','import','settings'].forEach(x=>$('#view-'+x).style.display=x===v?'block':'none');
  if(['browse','recall','retro','queue'].includes(v))openMem(true);
  R[v]();
}
function openMem(force){
  const sub=$('#memsub'),grp=$('#memgrp');
  const open=force!==undefined?force:sub.style.display==='none';
  sub.style.display=open?'flex':'none';grp.classList.toggle('open',open);
}
function setTab(s){
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  $('#set-general').style.display=s==='general'?'block':'none';
  $('#view-health').style.display=s==='health'?'block':'none';
  $('#view-help').style.display=s==='help'?'block':'none';
  if(s==='health')renderHealth();else if(s==='help')renderHelp();
}
document.querySelectorAll('.navi[data-v]').forEach(b=>b.addEventListener('click',()=>show(b.dataset.v)));
$('#memgrp').addEventListener('click',()=>openMem());
document.querySelectorAll('.stab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.s)));
renderDash();
api('/api/update-check').then(u=>{if(u&&u.update_available){const p=$('#upip');if(p)p.style.display='inline-block';}}).catch(()=>{});
</script>
</body>
</html>
